<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard | Kelowna Flower Gardens</title>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#fafafa;
}

.admin-container {
  display:flex;
  min-height:100vh;
}

.sidebar {
  width:220px;
  background:#F68686;
  padding:1rem;
  color:white;
}

.sidebar button {
  display:block;
  width:100%;
  margin-bottom:.5rem;
  padding:.6rem;
  border:none;
  background:white;
  color:#F68686;
  border-radius:8px;
  cursor:pointer;
}

.sidebar button:hover {
  background:#ffe3e3;
}

main {
  flex:1;
  padding:2rem;
}

table {
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:12px;
  overflow:hidden;
}

th, td {
  padding:.75rem;
  border-bottom:1px solid #eee;
}

th {
  background:#f5f5f5;
}

button.action {
  padding:.4rem .8rem;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.enable { background:#2ecc71;color:white; }
.disable { background:#e67e22;color:white; }
.delete { background:#e74c3c;color:white; }

</style>
</head>
<body>

<div class="admin-container">

  <aside class="sidebar">
    <h2>Admin</h2>
    <button onclick="loadMembers()">Members</button>
    <button onclick="loadEvents()">Events</button>
    <button onclick="loadRSVPSection()">RSVPs</button>
  </aside>

  <main id="content">
    <h2>Welcome Admin</h2>
    Select a section.
  </main>

</div>

<script>
async function loadMembers() {
  const res = await fetch("/api/admin/members", {
    credentials:"include"
  });

  if(!res.ok) {
    document.getElementById("content").innerHTML =
      "<p>Failed to load members</p>";
    return;
  }

  const members = await res.json();

  let html = `
    <h2>Members</h2>
    <table>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Paid</th>
        <th>Active</th>
        <th>Actions</th>
      </tr>
  `;

  members.forEach(m => {
    html += `
      <tr>
        <td>${m.name}</td>
        <td>${m.email}</td>
        <td>${m.paid ? "✅" : "❌"}</td>
        <td>${m.active ? "✅" : "❌"}</td>
        <td>
          <button class="action ${m.active ? "disable":"enable"}"
            onclick="toggleMember(${m.id})">
            ${m.active ? "Disable":"Enable"}
          </button>
        </td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("content").innerHTML = html;
}

async function toggleMember(id) {
  await fetch("/api/admin/toggle-member", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    credentials:"include",
    body:JSON.stringify({ id })
  });

  loadMembers();
}

async function loadEvents() {
  const res = await fetch("/api/admin/events", {
    credentials:"include"
  });

  const events = await res.json();

  let html = "<h2>Events</h2>";

  events.forEach(e => {
    html += `
      <div style="margin-bottom:1rem;padding:1rem;background:white;border-radius:12px;">
        <strong>${e.title}</strong><br>
        ${e.event_date}<br>
        Capacity: ${e.capacity}
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}

async function loadRSVPSection() {
  document.getElementById("content").innerHTML = `
    <h2>RSVPs</h2>
    <select id="eventSelect"></select>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Checked In</th>
        </tr>
      </thead>
      <tbody id="rsvpTable"></tbody>
    </table>
  `;

  const res = await fetch("/api/admin/events", {
    credentials:"include"
  });

  const events = await res.json();
  const select = document.getElementById("eventSelect");

  events.forEach(e => {
    const opt = document.createElement("option");
    opt.value = e.id;
    opt.textContent = e.title;
    select.appendChild(opt);
  });

  select.addEventListener("change", e => {
    loadRSVPs(e.target.value);
  });

  if(events.length) {
    loadRSVPs(events[0].id);
  }
}

async function loadRSVPs(eventId) {
  const res = await fetch(`/api/admin/events/${eventId}/rsvps`, {
    credentials:"include"
  });

  const data = await res.json();
  const tbody = document.getElementById("rsvpTable");

  tbody.innerHTML = "";

  data.forEach(r => {
    tbody.innerHTML += `
      <tr>
        <td>${r.name}</td>
        <td>${r.email}</td>
        <td>${r.checked_in ? "✅" : "⏳"}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
