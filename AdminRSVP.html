<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard | Kelowna Flower Gardens</title>

<link rel="icon" href="KFGL.jpg">

<style>
:root{
  --pink:#F68686;
  --radius:14px;
}

body{
  margin:0;
  font-family:system-ui;
  background:#fafafa;
}

header{
  background:var(--pink);
  color:white;
  padding:1rem;
  text-align:center;
}

main{
  max-width:1100px;
  margin:auto;
  padding:1rem;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:var(--radius);
  overflow:hidden;
}

th, td{
  padding:.75rem;
  border-bottom:1px solid #eee;
}

th{
  background:#f5f5f5;
}

button{
  border:none;
  padding:.4rem .8rem;
  border-radius:8px;
  cursor:pointer;
}

.enable{background:#2ecc71;color:white}
.disable{background:#e67e22;color:white}
.delete{background:#e74c3c;color:white}
</style>
</head>

<body>

<header>
  <h1>Admin Dashboard</h1>
  <p>Kelowna Flower Gardens</p>
</header>

<main>

<h2>Members</h2>

<table id="membersTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Username</th>
      <th>Status</th>
      <th>Paid</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
  
<h2>Event RSVPs</h2>
  
<div id="analytics" class="card">
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>RSVP Date</th>
      <th>Checked In</th>
      <button onclick="checkIn(${r.id})">Check In</button>
    </tr>
  </thead>
  <tbody id="rsvpTable"></tbody>
  <td>
  <button onclick="cancelRSVP(${r.id})">Cancel</button>
</td>

</table>
</div>
</main>

<script>

  db.prepare(`
CREATE TABLE IF NOT EXISTS rsvps (
  id INTEGER PRIMARY KEY AUTOINCREMENT,
  user_id INTEGER NOT NULL,
  event_id INTEGER NOT NULL,
  waitlisted INTEGER DEFAULT 0,
  checked_in INTEGER DEFAULT 0,
  checkin_token TEXT,
  created_at DATETIME DEFAULT CURRENT_TIMESTAMP,

  FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE CASCADE,
  FOREIGN KEY (event_id) REFERENCES events(id) ON DELETE CASCADE,

  UNIQUE(user_id, event_id)
)
`).run();

  function sendEventReminders() {
  const tomorrow = db.prepare(`
    SELECT id, title
    FROM events
    WHERE date(event_date) = date('now', '+1 day')
  `).all();

  tomorrow.forEach(event => {
    const attendees = db.prepare(`
      SELECT u.email, u.name
      FROM rsvps r
      JOIN users u ON u.id = r.user_id
      WHERE r.event_id = ?
      AND r.waitlisted = 0
    `).all(event.id);

    attendees.forEach(user => {
      transporter.sendMail({
        from: process.env.EMAIL_USER,
        to: user.email,
        subject: `Reminder: ${event.title} Tomorrow`,
        html: `
          Hi ${user.name},<br><br>
          Just a reminder that you RSVP’d for ${event.title}.
          We look forward to seeing you!
        `
      });
    });
  });
}


const cron = require("node-cron");

cron.schedule("0 8 * * *", () => {
  sendEventReminders();
});


const nodemailer = require("nodemailer");

const transporter = nodemailer.createTransport({
  service: "gmail",
  auth: {
    user: process.env.EMAIL_USER,
    pass: process.env.EMAIL_PASS
  }
});

const next = db.prepare(`
  SELECT id FROM rsvps
  WHERE event_id = ?
  AND waitlisted = 1
  ORDER BY created_at ASC
  LIMIT 1
`).get(eventId);

if (next) {
  db.prepare(`
    UPDATE rsvps
    SET waitlisted = 0
    WHERE id = ?
  `).run(next.id);
}

  app.post("/api/events/:id/rsvp", requireLogin, (req, res) => {
  const eventId = req.params.id;

  const event = db.prepare(`
    SELECT capacity FROM events WHERE id = ?
  `).get(eventId);

  const currentCount = db.prepare(`
    SELECT COUNT(*) as count
    FROM rsvps
    WHERE event_id = ? AND waitlisted = 0
  `).get(eventId).count;

  let waitlisted = 0;

  if (event.capacity && currentCount >= event.capacity) {
    waitlisted = 1;
  }

  db.prepare(`
    INSERT INTO rsvps (user_id, event_id, waitlisted)
    VALUES (?, ?, ?)
  `).run(req.session.userId, eventId, waitlisted);

  res.json({
    success: true,
    waitlisted
  });
});

  async function cancelRSVP(id) {
  if (!confirm("Cancel this RSVP?")) return;

  await fetch(`/api/admin/rsvps/${id}/cancel`, {
    method: "POST",
    credentials: "include"
  });

  const eventId = document.getElementById("eventSelect").value;
  loadRSVPs(eventId);
}


  app.post("/api/admin/rsvps/:id/cancel", requireAdmin, (req, res) => {
  db.prepare("DELETE FROM rsvps WHERE id = ?")
    .run(req.params.id);

  res.json({ success: true });
});

async function loadMembers(){
  const res = await fetch("/api/admin/members", {
    credentials:"include"
  });

  if(res.status === 401){
    location.href = "LoggedOut.html";
    return;
  }

  const members = await res.json();
  const tbody = document.querySelector("#membersTable tbody");
  tbody.innerHTML = "";

  members.forEach(m => {
    tbody.innerHTML += `
      <tr>
        <td>${m.name}</td>
        <td>${m.email}</td>
        <td>${m.username}</td>
        <td>${m.active ? "Active" : "Inactive"}</td>
        <td>${m.paid ? "Yes" : "No"}</td>
        <td>
          <button class="${m.active ? "disable" : "enable"}"
            onclick="toggleMember(${m.id})">
            ${m.active ? "Disable" : "Enable"}
          </button>
          <button class="delete"
            onclick="deleteMember(${m.id})">
            Delete
          </button>
        </td>
      </tr>
    `;
  });
}
  app.post("/api/admin/rsvps/:id/checkin", requireAdmin, (req, res) => {
  db.prepare(`
    UPDATE rsvps
    SET checked_in = 1
    WHERE id = ?
  `).run(req.params.id);

  res.json({ success: true });
});

app.get("/api/admin/events/:id/rsvps", requireAdmin, (req, res) => {
  const rows = db.prepare(`
    SELECT
      r.id,
      r.checked_in,
      r.created_at,
      u.name,
      u.email
    FROM rsvps r
    JOIN users u ON u.id = r.user_id
    WHERE r.event_id = ?
    ORDER BY r.created_at DESC
  `).all(req.params.id);

  res.json(rows);
});

  async function loadAnalytics(eventId) {
  const res = await fetch(`/api/admin/events/${eventId}/rsvp-analytics`, {
    credentials: "include"
  });

  const data = await res.json();

  document.getElementById("analytics").innerHTML = `
    <h3>RSVP Analytics</h3>
    <p><strong>Total RSVPs:</strong> ${data.total}</p>
    <p><strong>Checked In:</strong> ${data.checked_in}</p>
    <p><strong>No Shows:</strong> ${data.no_shows}</p>
    <p><strong>Attendance Rate:</strong> ${data.attendance_rate}%</p>
  `;
}

  
app.get("/api/admin/events", requireAdmin, (req, res) => {
  const events = db.prepare(`
    SELECT id, title FROM events
    ORDER BY event_date DESC
  `).all();

  res.json(events);
});
  
async function toggleMember(id){
  await fetch("/api/admin/toggle-member", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    credentials:"include",
    body: JSON.stringify({ id })
  });
  loadMembers();
}

async function deleteMember(id){
  if(confirm("Delete this member?")){
    await fetch("/api/admin/delete-member", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      credentials:"include",
      body: JSON.stringify({ id })
    });
    loadMembers();
  }
}

loadMembers();

async function loadRSVPs(eventId) {
  const res = await fetch(`/api/admin/events/${eventId}/rsvps`, {
    credentials: "include"
  });

  if (res.status === 401) {
    location.href = "LoggedOut.html";
    return;
  }

  const data = await res.json();
  const table = document.getElementById("rsvpTable");

  table.innerHTML = "";

  data.forEach(r => {
    table.innerHTML += `
      <tr>
        <td>${r.name}</td>
        <td>${r.email}</td>
        <td>${new Date(r.created_at).toLocaleString()}</td>
        <td>${r.checked_in ? "✅" : "⏳"}</td>
      </tr>
    `;
  });
}

// Example: Load event 3
loadRSVPs(3);

  loadAnalytics(eventId);

</script>

  
</body>
</html>
